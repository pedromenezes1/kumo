name: Pull Request

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - ".changeset/**"
  # Also trigger on push to PR branches (for bots that push via API)
  push:
    branches:
      - "opencode/**"
    paths-ignore:
      - "*.md"
      - ".changeset/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changeset:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/install-dependencies
      - run: pnpm tsx ci/scripts/validate-kumo-changeset.ts

  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - run: pnpm --filter @cloudflare/kumo build
      - uses: actions/upload-artifact@v4
        with:
          name: kumo-dist
          path: packages/kumo/dist
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: kumo-ai
          path: packages/kumo/ai
          retention-days: 1

  lint:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - uses: actions/download-artifact@v4
        with:
          name: kumo-dist
          path: packages/kumo/dist
      - uses: actions/download-artifact@v4
        with:
          name: kumo-ai
          path: packages/kumo/ai
      - run: pnpm lint

  typecheck:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - uses: actions/download-artifact@v4
        with:
          name: kumo-dist
          path: packages/kumo/dist
      - uses: actions/download-artifact@v4
        with:
          name: kumo-ai
          path: packages/kumo/ai
      - run: pnpm typecheck

  test:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/install-dependencies
      - uses: actions/download-artifact@v4
        with:
          name: kumo-dist
          path: packages/kumo/dist
      - uses: actions/download-artifact@v4
        with:
          name: kumo-ai
          path: packages/kumo/ai
      - run: pnpm --filter @cloudflare/kumo test
